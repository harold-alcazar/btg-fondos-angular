<h2 mat-dialog-title>Suscribirse a fondo</h2>

<mat-dialog-content>
  <p><strong>Fondo:</strong> {{ data.fund.name }}</p>
  <p><strong>Categoria:</strong> {{ data.fund.category }}</p>
  <p>
    <strong>Monto minimo:</strong>
    {{ data.fund.minimumAmount | currency : 'COP' : 'symbol' : '1.0-0' }}
  </p>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Metodo de notificacion</mat-label>
    <mat-select [formControl]="notificationMethodControl">
      <mat-option value="email">Email</mat-option>
      <mat-option value="sms">SMS</mat-option>
    </mat-select>
    @if (notificationMethodControl.hasError('required')) {
      <mat-error>Seleccion obligatoria</mat-error>
    }
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" (click)="confirm()">
    Confirmar suscripcion
  </button>
</mat-dialog-actions>
